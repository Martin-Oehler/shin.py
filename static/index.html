<!doctype html>
<!-- Chat UI as a thin client: one EventSource on /events renders everything,
     the input box only POSTs to /message. The page never tracks state of its
     own — whatever the daemon broadcasts is what you see, so cron-triggered
     and CLI turns appear here exactly like web turns. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shin</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; background: #f4f4f5;
         display: flex; flex-direction: column; height: 100vh; }
  #log { flex: 1; overflow-y: auto; padding: 1rem; max-width: 48rem;
         width: 100%; margin: 0 auto; box-sizing: border-box; }
  .bubble { padding: .6rem .9rem; border-radius: .75rem; margin: .4rem 0;
            max-width: 85%; white-space: pre-wrap; word-break: break-word; }
  .user { background: #2563eb; color: white; margin-left: auto; width: fit-content; }
  .assistant { background: white; border: 1px solid #e4e4e7; width: fit-content; }
  .source { font-size: .7rem; opacity: .6; margin: .5rem 0 -.3rem;
            text-align: right; }
  .source.assistant-tag { text-align: left; }
  details { margin: .3rem 0; font-size: .85rem; color: #52525b; }
  details > summary { cursor: pointer; user-select: none; }
  details > pre { background: #18181b; color: #d4d4d8; padding: .6rem;
                  border-radius: .5rem; overflow-x: auto; white-space: pre-wrap;
                  word-break: break-word; }
  form { display: flex; gap: .5rem; padding: 1rem; max-width: 48rem;
         width: 100%; margin: 0 auto; box-sizing: border-box; }
  input { flex: 1; padding: .6rem .9rem; border: 1px solid #d4d4d8;
          border-radius: .75rem; font-size: 1rem; }
  button { padding: .6rem 1.2rem; border: none; border-radius: .75rem;
           background: #2563eb; color: white; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
<main id="log"></main>
<form id="form">
  <input id="input" autocomplete="off" placeholder="Message shin…" autofocus>
  <button>Send</button>
</form>
<script>
const log = document.getElementById("log");

function add(node) {
  log.appendChild(node);
  log.scrollTop = log.scrollHeight;
}

function bubble(role, event) {
  const tag = document.createElement("div");
  tag.className = "source" + (role === "assistant" ? " assistant-tag" : "");
  tag.textContent = `${role} · ${event.source}`;
  add(tag);
  const div = document.createElement("div");
  div.className = `bubble ${role}`;
  div.textContent = event.content;
  add(div);
}

function block(summary, body) {
  const details = document.createElement("details");
  details.innerHTML = "<summary></summary><pre></pre>";
  details.querySelector("summary").textContent = summary;
  details.querySelector("pre").textContent = body;
  add(details);
}

// tool_call/tool_result events carry the OpenAI message dicts verbatim
// (see memory.py); pick out the human-relevant parts for display.
const render = {
  user:       e => bubble("user", e),
  assistant:  e => bubble("assistant", e),
  reasoning:  e => block("reasoning", e.content),
  tool_call:  e => block("tool call", e.content.tool_calls
                    .map(tc => `${tc.function.name} ${tc.function.arguments}`)
                    .join("\n")),
  tool_result: e => block("tool result", e.content.content),
};

new EventSource("/events").onmessage = msg => {
  const event = JSON.parse(msg.data);
  (render[event.type] || (() => {}))(event);
};

// The answer arrives through the event stream like everything else, so the
// POST response is ignored; the box is locked until the run completes to
// mirror the daemon's one-run-at-a-time policy.
const form = document.getElementById("form");
const input = document.getElementById("input");
form.onsubmit = async ev => {
  ev.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.disabled = true;
  try {
    await fetch("/message", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, source: "web" }),
    });
  } finally {
    input.disabled = false;
    input.focus();
  }
};
</script>
</body>
</html>
